version: 2

sources:
  - name: bronze
    schema: bronze
    tables:
      - name: raw_par2_csv
        description: >
          PAR sales, CSV monthly export. Sole target of the file-based loader
          (ingestion/run.py → PAR2CSVIngester). C4 split table.
      - name: raw_par2_api
        description: >
          PAR sales, daily SOAP API. Sole target of ingestion/par_api.py
          (write_raw_par2). Carries entry_id; C4 split table.
      # raw_par2 REMOVED (C4 close): dropped from Supabase after 1:1 migration to
      # raw_par2_csv + raw_par2_api. Superseded by model bronze_par2 (UNION with
      # CSV-over-API precedence).
      - name: raw_ls2
