version: 2

sources:
  - name: bronze
    schema: bronze
    tables:
      - name: raw_par2_csv
        description: >
          PAR sales, CSV monthly export. Sole target of the file-based loader
          (ingestion/run.py → PAR2CSVIngester). C4 split table.
      - name: raw_par2_api
        description: >
          PAR sales, daily SOAP API. Sole target of ingestion/par_api.py
          (write_raw_par2). Carries entry_id; C4 split table.
      - name: raw_par2
        description: >
          DEPRECATED (C4). Former shared table written by BOTH the CSV loader
          and the PAR API with incompatible DELETE predicates → silent
          clobbering. Superseded by raw_par2_csv + raw_par2_api, combined in
          model bronze_par2 with CSV-over-API precedence. Retained read-only for
          transition/comparison; no writer targets it anymore. Pending
          user-confirmed deprecation.
      - name: raw_ls2
