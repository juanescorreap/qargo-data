version: 2

models:
  - name: fact_order
    description: >
      One row per real order (grain = source_system + order_id). order_count is a
      literal 1, so sum(order_count) is additive by construction (fixes C1).
    columns:
      - name: date_key
        tests:
          - not_null
      - name: store_key
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: order_count
        description: "Always 1. Sum for a true, additive order count."
        tests:
          - not_null

  - name: fact_sale_item
    description: >
      One row per (order, product). qty is the real "Items Sold" measure (fixes C2).
    columns:
      - name: date_key
        tests:
          - not_null
      - name: store_key
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: qty
        description: >
          Items Sold, NET of returns. LS2 contributes real signed Qty (negative lines =
          returns, which subtract); PAR contributes 1.0 per item line (PAR exposes no
          quantity in CSV or API). Decided 2026-06-25, consistent with the 'net sales'
          convention used elsewhere. NOT gross — a separate "Items Returned" metric is
          backlog. Can be negative at row level; do not apply is_non_negative.
        tests:
          - not_null

  - name: fact_order_detail
    description: >
      One row per real order (grain = source_system + order_id), SAME grain as fact_order
      for a clean 1:1 JOIN. Carries the per-order money extras (discount_total, tax_amount,
      tip_amount) that fact_order/fact_sale_item omit; restores Delivery Leakage and
      similar metrics dropped with fact_sales. Limitations: tip_amount is always 0 (POS
      feeds expose no tip); LS2 orders resolve to destination_key = 0 (LS2 has no
      destination).
    columns:
      - name: date_key
        tests:
          - not_null
      - name: store_key
        tests:
          - not_null
      - name: source_system
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: tip_amount
        description: "Always 0 — no tip data in the current POS integration. Kept for forward-compatibility."

  - name: fact_by_employee
    description: >
      One row per employee per store per day (grain = date_key + store_key + employee_key).
      Rebuilds the dropped fact_sales_by_employee to restore per-employee metrics
      (Up-selling Leaderboard, Discount Audit, Labor Efficiency, Top Employees).
      Limitations: tip_amount is always 0; employee_key = 0 (UNKNOWN) absorbs unmapped
      staff and any PAR API numeric IDs (excluded by dim_employee) — filter
      employee_key <> 0 for named-employee leaderboards.
    columns:
      - name: date_key
        tests:
          - not_null
      - name: store_key
        tests:
          - not_null
      - name: employee_key
        description: "0 = UNKNOWN (unmapped names + PAR API numeric IDs). Filter <> 0 for named leaderboards."
        tests:
          - not_null
      - name: tip_amount
        description: "Always 0 — no tip data in the current POS integration. Kept for forward-compatibility."
