name: Daily Pipeline

on:
  schedule:
    - cron: '0 8 * * *'   # 8 AM UTC = 3 AM EST
  workflow_dispatch:        # manual trigger button in GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create dbt profiles.yml
        run: |
          python3 - << 'PYEOF'
          import os, urllib.parse, pathlib, yaml
          url = urllib.parse.urlparse(os.environ['SUPABASE_DB_URL'])
          password = urllib.parse.unquote(url.password)
          profiles = {
              'qargo': {
                  'target': 'dev',
                  'outputs': {
                      'dev': {
                          'type': 'postgres',
                          'host': url.hostname,
                          'port': url.port or 6543,
                          'dbname': url.path.lstrip('/'),
                          'user': url.username,
                          'password': password,
                          'schema': 'bronze',
                          'threads': 4,
                          'connect_timeout': 10,
                          'sslmode': 'require',
                          'options': '-c statement_timeout=30000',
                          'prepare_threshold': 0,
                      }
                  }
              }
          }
          dbt_dir = pathlib.Path.home() / '.dbt'
          dbt_dir.mkdir(exist_ok=True)
          (dbt_dir / 'profiles.yml').write_text(yaml.dump(profiles, default_flow_style=False, allow_unicode=True))
          print("profiles.yml created OK")
          PYEOF
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      # Parse SUPABASE_DB_URL into individual vars needed by Evidence connection.yaml
      - name: Export Supabase connection vars
        run: |
          python3 << 'PYEOF'
          import os, urllib.parse
          url = urllib.parse.urlparse(os.environ['SUPABASE_DB_URL'])
          password = urllib.parse.unquote(url.password)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              for key, val in [
                  ('SUPABASE_HOST',    url.hostname),
                  ('SUPABASE_PORT',    str(url.port)),
                  ('SUPABASE_DBNAME',  url.path.lstrip('/')),
                  ('SUPABASE_USER',    url.username),
                  ('SUPABASE_PASSWORD', password),
              ]:
                  f.write(f'{key}<<GHEOF\n{val}\nGHEOF\n')
          PYEOF
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Load new data into Supabase
        run: |
          par_count=$(ls data/DDBB_*.csv 2>/dev/null | wc -l)
          ls_count=$(ls data/qargocoffee-hqaccount_*_transactions_*.csv 2>/dev/null | wc -l)
          if [ "$par_count" -gt 0 ] || [ "$ls_count" -gt 0 ]; then
            echo "Found $par_count PAR file(s) and $ls_count LS file(s). Running ingestion."
            python ingestion/run.py
          else
            echo "No data files found in data/ — skipping ingestion."
          fi
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: dbt run
        run: dbt run --project-dir qargo --profiles-dir ~/.dbt

      - name: dbt test
        run: dbt test --project-dir qargo --profiles-dir ~/.dbt

      - name: Install Evidence dependencies
        run: npm ci --prefix dashboard

      - name: Create Evidence connection.yaml
        run: |
          python3 - << 'PYEOF'
          import os, pathlib, yaml
          config = {
              'name': 'gold',
              'type': 'postgres',
              'options': {
                  'host': os.environ['SUPABASE_HOST'],
                  'port': int(os.environ['SUPABASE_PORT']),
                  'database': os.environ['SUPABASE_DBNAME'],
                  'user': os.environ['SUPABASE_USER'],
                  'password': os.environ['SUPABASE_PASSWORD'],
                  'ssl': {'rejectUnauthorized': False},
              },
          }
          dest = pathlib.Path('dashboard/sources/gold/connection.yaml')
          dest.parent.mkdir(parents=True, exist_ok=True)
          dest.write_text(yaml.dump(config, default_flow_style=False, allow_unicode=True))
          print("connection.yaml written OK")
          PYEOF

      - name: Generate Evidence sources
        run: npm run sources --prefix dashboard

      - name: Build Evidence dashboard
        run: npm run build --prefix dashboard

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard/.evidence/template/build --project-name=qargo-dashboard --commit-dirty=true
